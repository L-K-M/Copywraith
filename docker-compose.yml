services:
  copywraith-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3742:3742"
    volumes:
      - copywraith-data:/data
    environment:
      COPYWRAITH_DATA_DIR: /data
      PORT: 3742
      RUST_LOG: copywraith_server=info
      COPYWRAITH_ADMIN_API_KEY: ${COPYWRAITH_ADMIN_API_KEY:-}
    restart: unless-stopped

volumes:
  copywraith-data:
