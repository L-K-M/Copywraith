services:
  copywraith-server:
    image: ${COPYWRAITH_SERVER_IMAGE_REPO:-copywraith-server}:${COPYWRAITH_SERVER_IMAGE_TAG:-0.1.4}
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3742:3742"
    volumes:
      - ./copywraith-data:/data
    environment:
      COPYWRAITH_DATA_DIR: /data
      PORT: 3742
      COPYWRAITH_HOST: 0.0.0.0
      COPYWRAITH_MAX_BODY_BYTES: ${COPYWRAITH_MAX_BODY_BYTES:-67108864}
      RUST_LOG: copywraith_server=info
    restart: unless-stopped
